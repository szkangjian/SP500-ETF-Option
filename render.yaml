services:
  - type: web
    name: covered-call-dashboard
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: python screening_dashboard.py --host 0.0.0.0 --port $PORT
    envVars:
      - key: COVERED_CALL_READ_ONLY
        value: "true"
