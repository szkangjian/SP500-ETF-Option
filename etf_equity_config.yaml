data:
  benchmark: SPY
  history_period: 4y
  cache_dir: out
  metrics_filename: etf_equity_metrics.csv
  screened_filename: etf_equity_screen.csv

universe:
  mode: file
  path: etf_equity_universe.txt
  limit: null

screen:
  option_dte_min: 25
  option_dte_max: 45
  option_target_dte: 35
  target_otm_pct: 0.05

  min_price: 15
  min_size_metric: 3000000000
  min_dividend_yield: 0.02
  min_call_annualized_yield: 0.03
  min_call_open_interest: 50
  min_call_volume: 3
  max_option_spread_pct: 0.12

  min_beta_1y: -0.25
  max_beta_1y: 1.25
  min_realized_vol_1y: 0.08
  max_realized_vol_1y: 0.45

  min_total_return_3y: -0.10
  max_drawdown_3y: 0.50
  allowed_asset_types: [ETF]

output:
  top_n: 30
